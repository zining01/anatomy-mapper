      <path d="M40 160 C34 164 34 172 42 172" fill="none" stroke={lineSoft} />
      {/* mouth */}
      <path d="M40 196 C50 192 62 192 70 196" fill="none" stroke={line} />
      <path d="M42 206 C52 210 62 210 68 206" fill="none" stroke={lineSoft} />
      <path d="M70 150 C64 168 66 192 84 204" fill="none" stroke={lineSoft} />
      {/* EAR detail */}
      <path d="M118 136 C102 136 102 188 122 188 C140 188 142 168 136 158 C144 152 138 136 118 136 Z" fill={skinShade} stroke={line} />
      <path d="M123 150 C116 152 116 174 126 178" fill="none" stroke={lineSoft} />{/* antihelix */}
      <path d="M126 158 C121 160 121 168 127 172" fill="none" stroke={lineSoft} />{/* concha */}
      <path d="M120 156 C116 158 116 166 121 168" fill="none" stroke={lineSoft} />{/* tragus */}
      <line x1="112" y1="132" x2="110" y2="180" stroke={lineSoft} />{/* preauricular */}
      <line x1="148" y1="140" x2="152" y2="182" stroke={lineSoft} />{/* postauricular */}
      {/* jaw + neck */}
      <path d="M70 236 C100 248 140 244 160 228" fill="none" stroke={lineSoft} />
      <path d="M72 248 L72 316 L160 316 L176 248" fill={skinShade} stroke={line} />
      <line x1="168" y1="216" x2="150" y2="290" stroke={lineSoft} />
    </g>
  );
}

function HeadPosteriorArt() {
  return (
    <g stroke={line} strokeWidth="1" fill={skin}>
      <path d="M130 24 C86 24 60 64 60 120 C60 152 74 178 96 192 L96 210 L164 210 L164 192 C186 178 200 152 200 120 C200 64 174 24 130 24 Z" fill={skinShade} />
      <line x1="130" y1="30" x2="130" y2="152" stroke={lineSoft} />
      <path d="M80 70 C100 96 160 96 180 70" fill="none" stroke={lineSoft} />
      <path d="M78 130 C104 150 156 150 182 130" fill="none" stroke={lineSoft} />
      <path d="M60 120 C50 122 50 148 62 148 C70 148 70 132 66 126 Z" fill={skin} stroke={line} />
      <path d="M200 120 C210 122 210 148 198 148 C190 148 190 132 194 126 Z" fill={skin} stroke={line} />
      <path d="M96 192 L96 316 L164 316 L164 192" fill={skin} stroke={line} />
      <line x1="130" y1="154" x2="130" y2="316" stroke={lineSoft} />
      <path d="M104 202 C100 244 100 280 104 316" fill="none" stroke={lineSoft} />
      <path d="M156 202 C160 244 160 280 156 316" fill="none" stroke={lineSoft} />
    </g>
  );
}

// Body outline — arms branch from the shoulders at the top of the torso.
// Path: neck -> right shoulder/deltoid -> down outer R arm -> R hand ->
// up inner R arm -> R torso side -> R leg -> crotch -> L leg -> up L torso
// side -> up inner L arm -> L hand -> down? no: mirror back up to L shoulder -> neck.
const BODY_OUTLINE =
  // start at right side of neck
  "M182 100 " +
  // shoulder slopes out to right deltoid
  "C170 104 156 110 148 122 " +
  // down the outer right upper arm to elbow
  "C140 140 132 168 126 196 " +
  // outer right forearm to wrist
  "C122 224 118 252 114 282 " +
  // right hand
  "C112 300 110 312 112 322 C114 332 126 332 128 322 " +
  // up inner right forearm
  "C130 300 134 268 138 240 " +
  // up inner right upper arm into armpit
  "C142 212 146 188 150 168 " +
  // armpit tuck into torso side
  "C152 158 156 150 162 146 " +
  // right torso side down to hip
  "C158 190 156 240 156 288 " +
  // right hip / outer thigh
  "C155 300 154 306 153 312 C148 350 142 396 140 440 " +
  // outer right leg to ankle
  "C138 470 137 500 138 524 C139 542 157 542 159 524 " +
  // inner right leg back up to crotch
  "C162 496 166 452 170 412 C172 388 174 360 176 340 " +
  // crotch
  "L200 336 L224 340 " +
  // inner left leg down
  "C226 360 228 388 230 412 C234 452 238 496 241 524 " +
  "C243 542 261 542 262 524 " +
  // outer left leg up to hip
  "C263 500 262 470 260 440 C258 396 252 350 247 312 " +
  "C246 306 245 300 244 288 C244 240 242 190 238 146 " +
  // left torso side up to armpit
  "C244 150 248 158 250 168 " +
  // up inner left upper arm
  "C254 188 258 212 262 240 " +
  // inner left forearm
  "C266 268 270 300 272 322 " +
  // left hand
  "C274 332 286 332 288 322 C290 312 288 300 286 282 " +
  // outer left forearm up
  "C282 252 278 224 274 196 " +
  // outer left upper arm up to shoulder
  "C268 168 260 140 252 122 " +
  // left shoulder slope back to neck
  "C244 110 230 104 218 100 " +
  // neck line
  "L218 100 Z";

function BodyArt({ posterior }) {
  return (
    <g stroke={line} strokeWidth="1.4" fill={skin}>
      <path d={BODY_OUTLINE} fill={skin} stroke={line} strokeWidth="1.6" />
      {/* head circle */}
      <ellipse cx="200" cy="58" rx="34" ry="40" fill={skin} stroke={line} />
      <path d="M200 18 C176 18 166 40 168 62 C185 50 215 50 232 62 C234 40 224 18 200 18 Z" fill={skinShade} stroke="none" />
      {/* neck */}
      <path d="M182 96 L182 112 L218 112 L218 96" fill={skinShade} stroke={lineSoft} />
      {/* shoulder line */}
      <path d="M150 130 C170 122 230 122 250 130" fill="none" stroke={lineSoft} />
      {/* torso midline */}
      <line x1="200" y1="120" x2="200" y2="310" stroke={lineSoft} />
      {posterior ? (
        <>
          <path d="M156 150 C178 160 222 160 244 150" fill="none" stroke={lineSoft} />
          <path d="M156 200 C178 210 222 210 244 200" fill="none" stroke={lineSoft} />
          <path d="M160 246 C182 256 218 256 240 246" fill="none" stroke={lineSoft} />
          <line x1="200" y1="278" x2="200" y2="316" stroke={lineSoft} />{/* gluteal cleft */}
        </>
      ) : (
        <>
          <path d="M156 176 C178 186 222 186 244 176" fill="none" stroke={lineSoft} />{/* pectoral */}
          <path d="M164 214 C184 222 216 222 236 214" fill="none" stroke={lineSoft} />{/* costal */}
          <path d="M166 284 C185 292 215 292 234 284" fill="none" stroke={lineSoft} />{/* suprapubic */}
        </>
      )}
      {/* elbow bands (match forearm dot columns) */}
      <path d="M122 214 C127 219 137 219 142 214" fill="none" stroke={lineSoft} />
      <path d="M258 214 C263 219 273 219 278 214" fill="none" stroke={lineSoft} />
      {/* knee bands */}
      <path d="M168 428 C176 434 186 434 194 428" fill="none" stroke={lineSoft} />
      <path d="M206 428 C214 434 224 434 232 428" fill="none" stroke={lineSoft} />
      {/* ankle bands */}
      <path d="M170 516 C176 521 186 521 192 516" fill="none" stroke={lineSoft} />
      <path d="M208 516 C214 521 224 521 230 516" fill="none" stroke={lineSoft} />
    </g>
  );
}

const ART = {
  faceAnterior: <FaceAnteriorArt />,
  headLateral: <HeadLateralArt />,
  headPosterior: <HeadPosteriorArt />,
  bodyAnterior: <BodyArt posterior={false} />,
  bodyPosterior: <BodyArt posterior={true} />,
};

const VIEW_ORDER = ["bodyAnterior", "bodyPosterior", "faceAnterior", "headLateral", "headPosterior"];
const VIEW_GROUPS = [
  { title: "Whole body", keys: ["bodyAnterior", "bodyPosterior"] },
  { title: "Head & neck", keys: ["faceAnterior", "headLateral", "headPosterior"] },
];

const GROUP_COLORS = { nose: "#c0562e", cheek: "#3d6b8a", lip: "#a23e6b", ear: "#5a7d3a" };

function AnatomyMapper() {
  const [view, setView] = useState("bodyAnterior");
  const [selected, setSelected] = useState([]);
  const [hovered, setHovered] = useState(null);
  const [query, setQuery] = useState("");
  const [copied, setCopied] = useState(false);
  const [showAllHead, setShowAllHead] = useState(false);

  const current = DATA[view];
  const isHeadView = view.startsWith("face") || view.startsWith("head");

  const allDots = useMemo(() => {
    const out = [];
    for (const k of VIEW_ORDER) for (const d of DATA[k].dots) out.push({ ...d, view: k, viewLabel: DATA[k].label });
    return out;
  }, []);

  const matches = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return [];
    return allDots.filter(d =>
      d.name.toLowerCase().includes(q) || (d.aliases || []).some(a => a.includes(q))
    ).slice(0, 10);
  }, [query, allDots]);

  const toggle = (d) => {
    setSelected(prev => prev.find(s => s.id === d.id)
      ? prev.filter(s => s.id !== d.id)
      : [...prev, { id: d.id, name: d.name }]);
  };

  const snippet = selected.map(s => s.name).join("; ");
  const copy = async () => {
    if (!snippet) return;
    try { await navigator.clipboard.writeText(snippet); setCopied(true); setTimeout(() => setCopied(false), 1400); } catch {}
  };

  const hoverName = hovered ? allDots.find(d => d.id === hovered)?.name : null;
  const dotColor = (d, sel) => sel ? "#e4572e" : (d.group ? GROUP_COLORS[d.group] : "#3d6b8a");

  const renderFigure = (viewKey, small) => {
    const data = DATA[viewKey];
    return (
      <div style={{ position: "relative", background: "#fff", border: "1px solid #e6ddd3", borderRadius: 12, padding: 10 }}>
        <div style={{ position: "absolute", top: 10, left: 12, fontSize: 12.5, color: "#8a5a3c", fontWeight: 600 }}>
          {small ? data.label : (hoverName || data.label)}
        </div>
        <svg viewBox={data.viewBox} style={{ width: "100%", height: "auto", maxHeight: small ? "42vh" : "72vh", display: "block", marginTop: 6 }}>
          {ART[viewKey]}
          {data.dots.map(d => {
            const isSel = !!selected.find(s => s.id === d.id);
            const isHov = hovered === d.id;
            return (
              <g key={d.id}
                 onClick={() => toggle(d)}
                 onMouseEnter={() => setHovered(d.id)}
                 onMouseLeave={() => setHovered(null)}
                 style={{ cursor: "pointer" }}>
                <circle cx={d.dot[0]} cy={d.dot[1]} r="9" fill="transparent" />
                <circle cx={d.dot[0]} cy={d.dot[1]} r={isSel ? 5.5 : isHov ? 5 : 3.6}
                  fill={dotColor(d, isSel)} stroke="#fff" strokeWidth="1.4"
                  style={{ transition: "r 100ms" }} />
                {d.link && <circle cx={d.dot[0]} cy={d.dot[1]} r="8" fill="none" stroke="#3d6b8a" strokeWidth="1" strokeDasharray="2 2" />}
              </g>
            );
          })}
        </svg>
      </div>
    );
  };

  return (
    <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", background: "#f6f4f1", minHeight: "100vh", color: "#2a2320", padding: "24px 16px" }}>
      <div style={{ maxWidth: 1100, margin: "0 auto" }}>
        <header style={{ marginBottom: 14 }}>
          <h1 style={{ fontSize: 25, margin: 0, fontWeight: 700 }}>Anatomy Region Mapper</h1>
          <p style={{ margin: "4px 0 0", color: "#7a6a5c", fontSize: 14 }}>
            Click a dot to select a region. Facial cosmetic subunits are color-coded; nasal subunits follow Burget &amp; Menick.
          </p>
        </header>

        <div style={{ display: "flex", gap: 24, flexWrap: "wrap", marginBottom: 12, alignItems: "flex-end" }}>
          {VIEW_GROUPS.map(g => (
            <div key={g.title}>
              <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 0.6, color: "#a3917f", marginBottom: 6 }}>{g.title}</div>
              <div style={{ display: "flex", gap: 6 }}>
                {g.keys.map(k => (
                  <button key={k} onClick={() => { setView(k); setShowAllHead(false); }}
                    style={{
                      padding: "7px 12px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer",
                      border: "1px solid " + (view === k && !showAllHead ? "#8a5a3c" : "#d8ccc0"),
                      background: view === k && !showAllHead ? "#8a5a3c" : "#fff",
                      color: view === k && !showAllHead ? "#fff" : "#4a3d33",
                    }}>
                    {DATA[k].label.replace(/^(Body|Head|Face|Head & neck) — /, "")}
                  </button>
                ))}
              </div>
            </div>
          ))}
          <button onClick={() => setShowAllHead(v => !v)}
            style={{ padding: "7px 12px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer",
              border: "1px solid " + (showAllHead ? "#8a5a3c" : "#d8ccc0"),
              background: showAllHead ? "#8a5a3c" : "#fff", color: showAllHead ? "#fff" : "#4a3d33" }}>
            All head views
          </button>
        </div>

        {/* legend */}
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 12, fontSize: 12, color: "#6a5c50" }}>
          {Object.entries({ Nose: GROUP_COLORS.nose, Cheek: GROUP_COLORS.cheek, Lip: GROUP_COLORS.lip, Ear: GROUP_COLORS.ear, Other: "#3d6b8a", Selected: "#e4572e" }).map(([k, c]) => (
            <span key={k} style={{ display: "inline-flex", alignItems: "center", gap: 5 }}>
              <span style={{ width: 10, height: 10, borderRadius: "50%", background: c, display: "inline-block" }} /> {k}
            </span>
          ))}
        </div>

        <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
          <div style={{ flex: "1 1 400px", minWidth: 300 }}>
            {showAllHead ? (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12 }}>
                {["faceAnterior", "headLateral", "headPosterior"].map(k => (
                  <div key={k}>{renderFigure(k, true)}</div>
                ))}
              </div>
            ) : renderFigure(view, false)}
            <div style={{ fontSize: 11.5, color: "#a3917f", textAlign: "center", padding: "6px 0" }}>
              Left / right = patient's anatomical side. Dashed dots on the body link to head views.
            </div>
          </div>

          <div style={{ flex: "1 1 300px", minWidth: 290 }}>
            <label style={{ fontSize: 13, fontWeight: 600, color: "#7a6a5c" }}>Search all regions</label>
            <input value={query} onChange={e => setQuery(e.target.value)}
              placeholder="e.g. soft triangle, columella, helix, popliteal"
              style={{ width: "100%", boxSizing: "border-box", padding: "10px 12px", marginTop: 6, marginBottom: 6, borderRadius: 8, border: "1px solid #d8ccc0", fontSize: 14 }} />
            {matches.length > 0 && (
              <div style={{ border: "1px solid #e6ddd3", borderRadius: 8, overflow: "hidden", marginBottom: 12 }}>
                {matches.map(m => (
                  <div key={m.id} onClick={() => { setView(m.view); setShowAllHead(false); toggle(m); setQuery(""); }}
                    style={{ padding: "8px 12px", cursor: "pointer", fontSize: 14, borderBottom: "1px solid #f2ece5", background: "#fff" }}
                    onMouseEnter={e => e.currentTarget.style.background = "#faf6f1"}
                    onMouseLeave={e => e.currentTarget.style.background = "#fff"}>
                    {m.name} <span style={{ color: "#a3917f", fontSize: 12 }}>· {m.viewLabel}</span>
                  </div>
                ))}
              </div>
            )}

            <div style={{ background: "#fff", border: "1px solid #e6ddd3", borderRadius: 12, padding: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 14, fontWeight: 700 }}>Selected ({selected.length})</span>
                {selected.length > 0 && <button onClick={() => setSelected([])} style={{ fontSize: 12, background: "none", border: "none", color: "#e4572e", cursor: "pointer" }}>Clear all</button>}
              </div>
              {selected.length === 0 ? (
                <p style={{ color: "#a3917f", fontSize: 13, margin: 0 }}>No regions selected yet. Click a dot on the figure.</p>
              ) : (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {selected.map(s => (
                    <span key={s.id} onClick={() => setSelected(prev => prev.filter(x => x.id !== s.id))}
                      style={{ background: "#fce9e2", color: "#b23c17", padding: "4px 10px", borderRadius: 20, fontSize: 13, cursor: "pointer" }} title="Remove">
                      {s.name} ✕
                    </span>
                  ))}
                </div>
              )}
              <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#7a6a5c", margin: "14px 0 6px" }}>Note snippet</label>
              <textarea readOnly value={snippet} placeholder="Selected region names appear here…"
                style={{ width: "100%", boxSizing: "border-box", minHeight: 70, padding: 10, borderRadius: 8, border: "1px solid #d8ccc0", fontSize: 14, resize: "vertical", background: "#fbf9f6" }} />
              <button onClick={copy} disabled={!snippet}
                style={{ marginTop: 8, width: "100%", padding: 10, borderRadius: 8, border: "none", cursor: snippet ? "pointer" : "not-allowed", background: snippet ? "#2a2320" : "#d8ccc0", color: "#fff", fontSize: 14, fontWeight: 600 }}>
                {copied ? "Copied ✓" : "Copy snippet"}
              </button>
            </div>
            <p style={{ fontSize: 11, color: "#a3917f", marginTop: 12, lineHeight: 1.5 }}>
              Teaching / reference aid. Artwork is a stylized approximation; boundaries are illustrative. Verify site and laterality against the patient before documenting.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AnatomyMapper />);
</script>
</body>
</html>
